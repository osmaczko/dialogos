# cargo-deny configuration. Advisories are denied; licenses are allowlisted.
# The allowlist below is a starting set for a large transitive tree (~570
# crates); the first `cargo deny check licenses` run reports any license not
# covered here, and the fix is to add the reviewed SPDX id, not to widen the
# match. `sources` allows the git deps we depend on by design.

[advisories]
# Every current advisory is in a transitive dependency the bot cannot upgrade
# directly: the libcrux post-quantum crypto stack that libchat pins through
# OpenMLS, and unmaintained proc-macro tooling. They are ignored so the gate
# still blocks advisories in the bot's own direct dependencies; re-review this
# list on each libchat pin bump and drop entries as upstream updates.
ignore = [
  # libcrux crypto (post-quantum), pinned via libchat -> openmls:
  "RUSTSEC-2026-0073", # panic in standalone MAC operations
  "RUSTSEC-2026-0075", # all-zero key generation on catastrophic RNG failure
  "RUSTSEC-2026-0124", # potential panic on overlong ciphertext buffer
  "RUSTSEC-2026-0207", # incorrect incremental portable SHAKE output
  "RUSTSEC-2026-0208", # potential panic in AVX2 SHAKE-256
  "RUSTSEC-2026-0209", # AES-GCM did not enforce AAD length limits
  "RUSTSEC-2026-0210", # libcrux-aesgcm renamed to libcrux-aes (unmaintained)
  "RUSTSEC-2026-0211", # non-constant-time auth tag check in AES-GCM
  "RUSTSEC-2026-0212", # constant-time swap/select on aarch64
  # unmaintained transitive proc-macro tooling:
  "RUSTSEC-2024-0436", # paste unmaintained
  "RUSTSEC-2026-0173", # proc-macro-error2 unmaintained
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "MPL-2.0",
  "CC0-1.0",
  # aws-lc-sys and ring both carry an OpenSSL-derived conjunct in the tree.
  "OpenSSL",
  # webpki-root-certs (the Mozilla CA-cert data) is under this permissive
  # data-license.
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

# The first-party Logos crates (libchat's workspace members and chat_proto) ship
# no `license` field in their manifests, though both repos are dual-licensed
# (LICENSE-MIT + LICENSE-APACHE at their roots). Clarify each to that license.
# The empty license-files list applies the clarification without a per-crate file
# hash, since the license text lives at each repo root, not in every crate.
[[licenses.clarify]]
name = "libchat"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "logos-chat"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "logos-generic-chat"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "logos-account"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "logos-delivery"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "embedded-logos-delivery"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "crypto"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "double-ratchets"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "components"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "shared-traits"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "storage"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "chat-sqlite"
expression = "MIT OR Apache-2.0"
license-files = []

[[licenses.clarify]]
name = "chat-proto"
expression = "MIT OR Apache-2.0"
license-files = []

[bans]
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
  "https://github.com/logos-messaging/libchat.git",
  "https://github.com/logos-messaging/chat_proto",
  "https://github.com/vacp2p/de-mls",
]
